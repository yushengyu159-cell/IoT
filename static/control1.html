<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-translate="control1.title">权限管理系统 - Control1</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .header h1 {
            color: #2c3e50;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-align: center;
            background: linear-gradient(45deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            color: #7f8c8d;
            text-align: center;
            font-size: 1.1rem;
        }

        .user-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            padding: 15px;
            background: rgba(52, 152, 219, 0.1);
            border-radius: 10px;
            border-left: 4px solid #3498db;
        }

        .user-details {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(45deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .user-text {
            color: #2c3e50;
        }

        .user-text h3 {
            margin-bottom: 5px;
            font-size: 1.2rem;
        }

        .user-text p {
            color: #7f8c8d;
            font-size: 0.9rem;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: #95a5a6;
            color: white;
        }

        .btn-secondary:hover {
            background: #7f8c8d;
            transform: translateY(-2px);
        }

        .btn-danger {
            background: #e74c3c;
            color: white;
        }

        .btn-danger:hover {
            background: #c0392b;
            transform: translateY(-2px);
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card h2 {
            color: #2c3e50;
            margin-bottom: 20px;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card h2 i {
            color: #667eea;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat-item {
            text-align: center;
            padding: 20px;
            background: rgba(52, 152, 219, 0.1);
            border-radius: 15px;
            border: 1px solid rgba(52, 152, 219, 0.2);
        }

        .stat-number {
            font-size: 2rem;
            font-weight: bold;
            color: #3498db;
            margin-bottom: 5px;
        }

        .stat-label {
            color: #7f8c8d;
            font-size: 0.9rem;
        }

        .permission-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .permission-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            margin-bottom: 10px;
            background: rgba(236, 240, 241, 0.5);
            border-radius: 10px;
            border-left: 4px solid #3498db;
            transition: all 0.3s ease;
        }

        .permission-item:hover {
            background: rgba(52, 152, 219, 0.1);
            transform: translateX(5px);
        }

        .permission-info h4 {
            color: #2c3e50;
            margin-bottom: 5px;
        }

        .permission-info p {
            color: #7f8c8d;
            font-size: 0.9rem;
        }

        .permission-actions {
            display: flex;
            gap: 10px;
        }

        .btn-sm {
            padding: 8px 15px;
            font-size: 0.8rem;
        }

        .btn-success {
            background: #27ae60;
            color: white;
        }

        .btn-success:hover {
            background: #229954;
        }

        .btn-warning {
            background: #f39c12;
            color: white;
        }

        .btn-warning:hover {
            background: #e67e22;
        }

        .search-section {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .search-form {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .search-input {
            flex: 1;
            padding: 15px;
            border: 2px solid #ecf0f1;
            border-radius: 10px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .filter-select {
            padding: 15px;
            border: 2px solid #ecf0f1;
            border-radius: 10px;
            font-size: 1rem;
            background: white;
            cursor: pointer;
        }

        .user-list {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .user-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            margin-bottom: 15px;
            background: rgba(236, 240, 241, 0.5);
            border-radius: 15px;
            border-left: 4px solid #3498db;
            transition: all 0.3s ease;
        }

        .user-item:hover {
            background: rgba(52, 152, 219, 0.1);
            transform: translateX(5px);
        }

        .user-info-item {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-avatar-sm {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(45deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1rem;
            font-weight: bold;
        }

        .user-details-item h4 {
            color: #2c3e50;
            margin-bottom: 5px;
        }

        .user-details-item p {
            color: #7f8c8d;
            font-size: 0.9rem;
        }

        .role-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .role-owner {
            background: #e8f5e8;
            color: #27ae60;
        }

        .role-manager {
            background: #fff3cd;
            color: #f39c12;
        }

        .role-institution {
            background: #d1ecf1;
            color: #17a2b8;
        }

        .permission-buttons {
            display: flex;
            gap: 10px;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: white;
            margin: 5% auto;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 600px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #ecf0f1;
        }

        .modal-header h2 {
            color: #2c3e50;
            margin: 0;
        }

        .close {
            color: #aaa;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .close:hover {
            color: #e74c3c;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #2c3e50;
            font-weight: 500;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #ecf0f1;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-actions {
            display: flex;
            gap: 15px;
            justify-content: flex-end;
            margin-top: 30px;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #7f8c8d;
        }

        .loading i {
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #7f8c8d;
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 20px;
            color: #bdc3c7;
        }

        .empty-state h3 {
            margin-bottom: 10px;
            color: #2c3e50;
        }

        .empty-state p {
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            .search-form {
                flex-direction: column;
            }
            
            .user-info {
                flex-direction: column;
                gap: 15px;
            }
            
            .action-buttons {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container" data-ui-id="control1">
        <!-- 页面头部 -->
        <div class="header">
            <h1><i class="fas fa-shield-alt"></i> <span data-translate="control1.header">权限管理系统</span></h1>
            <p data-translate="control1.subtitle">Control1 - 用户权限管理与监控平台</p>
            
            <!-- 用户信息 -->
            <div class="user-info">
                <div class="user-details">
                    <div class="user-avatar" id="userAvatar">A</div>
                    <div class="user-text">
                        <h3 id="userName">管理员</h3>
                        <p id="userRole">系统管理员</p>
                    </div>
                </div>
                <div class="action-buttons">
                    <button class="btn btn-primary" onclick="refreshData()" data-translate="control1.refresh">
                        <i class="fas fa-sync-alt"></i> 刷新数据
                    </button>
                    <button class="btn btn-secondary" onclick="showSettings()" data-translate="control1.settings">
                        <i class="fas fa-cog"></i> 设置
                    </button>
                    <button class="btn btn-danger" onclick="logout()" data-translate="control1.logout">
                        <i class="fas fa-sign-out-alt"></i> 退出
                    </button>
                </div>
            </div>
        </div>

        <!-- 搜索区域 -->
        <div class="search-section">
            <div class="search-form">
                <input type="text" class="search-input" id="searchInput" placeholder="搜索用户邮箱、姓名或角色..." data-translate="control1.search.placeholder">
                <select class="filter-select" id="roleFilter">
                    <option value="" data-translate="control1.filter.all">所有角色</option>
                    <option value="owner" data-translate="role.owner">业主</option>
                    <option value="property_manager" data-translate="role.property_manager">物业管理员</option>
                    <option value="institution" data-translate="role.institution">机构用户</option>
                </select>
                <button class="btn btn-primary" onclick="searchUsers()" data-translate="control1.search.btn">
                    <i class="fas fa-search"></i> 搜索
                </button>
                <button class="btn btn-secondary" onclick="clearSearch()" data-translate="control1.search.clear">
                    <i class="fas fa-times"></i> 清除
                </button>
            </div>
        </div>

        <!-- 主要内容区域 -->
        <div class="main-content">
            <!-- 统计信息卡片 -->
            <div class="card">
                <h2><i class="fas fa-chart-bar"></i> <span data-translate="control1.stats">系统统计</span></h2>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-number" id="totalUsers">0</div>
                        <div class="stat-label" data-translate="control1.stats.total">总用户数</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-number" id="activeUsers">0</div>
                        <div class="stat-label" data-translate="control1.stats.active">活跃用户</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-number" id="ownerUsers">0</div>
                        <div class="stat-label" data-translate="control1.stats.owner">业主用户</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-number" id="managerUsers">0</div>
                        <div class="stat-label" data-translate="control1.stats.manager">管理员</div>
                    </div>
                </div>
            </div>

            <!-- 权限管理卡片 -->
            <div class="card">
                <h2><i class="fas fa-key"></i> <span data-translate="control1.permissions">权限管理</span></h2>
                <div class="permission-list" id="permissionList">
                    <div class="loading">
                        <i class="fas fa-spinner"></i> <span data-translate="loading.permissions">加载权限信息...</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- 用户列表 -->
        <div class="user-list">
            <h2><i class="fas fa-users"></i> <span data-translate="control1.userlist">用户列表</span></h2>
            <div id="userListContainer">
                <div class="loading">
                    <i class="fas fa-spinner"></i> <span data-translate="loading.users">加载用户列表...</span>
                </div>
            </div>
        </div>
    </div>

    <!-- 用户详情模态框 -->
    <div id="userDetailModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2><i class="fas fa-user"></i> <span data-translate="modal.user.detail.title">用户详情</span></h2>
                <span class="close" onclick="closeModal('userDetailModal')">&times;</span>
            </div>
            <div id="userDetailContent">
                <!-- 用户详情内容将在这里动态加载 -->
            </div>
        </div>
    </div>

    <!-- 权限编辑模态框 -->
    <div id="permissionModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2><i class="fas fa-edit"></i> <span data-translate="modal.permission.edit.title">编辑权限</span></h2>
                <span class="close" onclick="closeModal('permissionModal')">&times;</span>
            </div>
            <form id="permissionForm">
                <div class="form-group">
                    <label for="permissionUser" data-translate="modal.permission.userEmail">用户邮箱</label>
                    <input type="email" id="permissionUser" readonly>
                </div>
                <div class="form-group">
                    <label for="permissionRole" data-translate="modal.permission.userRole">用户角色</label>
                    <select id="permissionRole">
                        <option value="owner" data-translate="role.owner">业主</option>
                        <option value="property_manager" data-translate="role.property_manager">物业管理员</option>
                        <option value="institution" data-translate="role.institution">机构用户</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="permissionStatus" data-translate="modal.permission.accountStatus">账户状态</label>
                    <select id="permissionStatus">
                        <option value="active" data-translate="modal.permission.status.active">活跃</option>
                        <option value="inactive" data-translate="modal.permission.status.inactive">禁用</option>
                        <option value="pending" data-translate="modal.permission.status.pending">待审核</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="permissionNotes" data-translate="modal.permission.notes">备注</label>
                    <textarea id="permissionNotes" rows="3" data-translate="modal.permission.notes.placeholder" placeholder="输入权限变更备注..."></textarea>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('permissionModal')" data-translate="modal.cancel">取消</button>
                    <button type="submit" class="btn btn-primary" data-translate="modal.save">保存更改</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 多语言脚本 -->
    <script src="/static/language-config.js"></script>
    <script src="/static/auto-translate.js"></script>
    <script src="/static/control1.js?v=20250922-i18n"></script>
</body>
</html>
