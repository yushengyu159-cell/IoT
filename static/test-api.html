<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API连接测试</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-result { margin: 10px 0; padding: 10px; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        button { padding: 10px 20px; margin: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>API连接测试</h1>
    
    <button onclick="testConnection()">测试API连接</button>
    <button onclick="testRegister()">测试DID注册</button>
    <button onclick="testDownload()">测试文件下载</button>
    <button onclick="testEncryptedDownload()">测试加密文件下载</button>
    
    <div id="results"></div>

    <script>
        const API_BASE_URL = 'http://47.238.159.234:8199/api';
        
        function addResult(message, type) {
            const results = document.getElementById('results');
            const div = document.createElement('div');
            div.className = `test-result ${type}`;
            div.textContent = message;
            results.appendChild(div);
        }
        
        async function testConnection() {
            try {
                addResult('正在测试API连接...', 'success');
                
                const response = await fetch(`${API_BASE_URL}/index`);
                addResult(`连接成功！状态码: ${response.status}`, 'success');
                
            } catch (error) {
                addResult(`连接失败: ${error.message}`, 'error');
                console.error('连接错误:', error);
            }
        }
        
        async function testRegister() {
            try {
                addResult('正在测试DID注册...', 'success');
                
                const testData = {
                    name: "测试用户",
                    phone: "13800138000",
                    email: "test@test.com",
                    role: "user",
                    age: 25,
                    password: "12345678"
                };
                
                const response = await fetch(`${API_BASE_URL}/did/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(testData)
                });
                
                if (response.ok) {
                    const result = await response.json();
                    addResult(`注册成功！DID: ${result.data.did}`, 'success');
                } else {
                    addResult(`注册失败！状态码: ${response.status}`, 'error');
                }
                
            } catch (error) {
                addResult(`注册失败: ${error.message}`, 'error');
                console.error('注册错误:', error);
            }
        }
        
        async function testDownload() {
            try {
                addResult('正在测试普通文件下载...', 'success');
                
                // 使用一个已知的CID测试下载
                const cid = 'QmSAoDWr4sK3VkhpXTCKBPadpUz9sFiVj1GVr9bvHYYga5';
                const response = await fetch(`${API_BASE_URL}/ipfs/download?cid=${cid}`);
                
                if (response.ok) {
                    addResult('普通文件下载接口测试成功！', 'success');
                    // 尝试下载文件
                    const blob = await response.blob();
                    addResult(`文件大小: ${blob.size} 字节`, 'success');
                } else {
                    addResult(`下载失败！状态码: ${response.status}`, 'error');
                }
                
            } catch (error) {
                addResult(`下载测试失败: ${error.message}`, 'error');
                console.error('下载错误:', error);
            }
        }
        
        async function testEncryptedDownload() {
            try {
                addResult('正在测试加密文件下载...', 'success');
                
                // 使用已知的加密文件参数测试
                const downloadData = {
                    cids: ["QmSAoDWr4sK3VkhpXTCKBPadpUz9sFiVj1GVr9bvHYYga5","QmQe7kHdtEKaywmwcSomGUTJjPKUuowRt6bc1Qcp1PtiqC","QmQq4bY6FRj9uPnhwbNGz3XHDhRFPi4muLkXbYz18WRrTk","QmQqE8MYzVs75CP9n8RYtwb9Rsdx1sVsxVeQh8sPk1VzHv"],
                    key: "2ypUVEn/QNfcWlgNZdHEwvnRZ4InfaZWknchztu3cA8=",
                    iv: "kMEyx/sVQ3M79Ob2nl2njw=="
                };
                
                const response = await fetch(`${API_BASE_URL}/ipfs/download-decrypted`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(downloadData)
                });
                
                if (response.ok) {
                    addResult('加密文件下载接口测试成功！', 'success');
                    // 尝试下载文件
                    const blob = await response.blob();
                    addResult(`解密后文件大小: ${blob.size} 字节`, 'success');
                    
                    // 创建下载链接
                    const url = window.URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = '测试下载_共识方案.pdf';
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    window.URL.revokeObjectURL(url);
                    
                    addResult('文件已开始下载！', 'success');
                } else {
                    addResult(`加密下载失败！状态码: ${response.status}`, 'error');
                }
                
            } catch (error) {
                addResult(`加密下载测试失败: ${error.message}`, 'error');
                console.error('加密下载错误:', error);
            }
        }
    </script>
</body>
</html>
