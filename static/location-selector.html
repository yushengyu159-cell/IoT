<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="ui-id" content="location-selector">
    <title data-translate="location.page.title">ESG VISA - 位置选择</title>
    <link rel="stylesheet" href="/static/styles.css?v=20250819-location-selector">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Leaflet地图库 -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- 引入统一语言配置 -->
    <script src="/static/language-config.js"></script>
    <script src="/static/auto-translate.js"></script>
</head>
<body>
    <div class="container" data-ui-id="location-selector">
        <div class="grid-pattern"></div>
        
        <div class="main-content-login" style="max-width:900px;">
            <div class="logo-container" style="margin-bottom:16px;">
                <div class="logo-image" style="width:48px;height:48px;">
                    <img src="/static/log.png" alt="ESG VISA Logo" class="logo-img" style="width:40px;height:40px;">
                </div>
            </div>

            <div class="header" style="margin-bottom:20px;">
                <h1 data-translate="location.title">选择位置</h1>
                <p data-translate="location.subtitle">请选择您的建筑所在位置</p>
            </div>

            <div class="form-container">
                <!-- 搜索框 -->
                <div class="form-group">
                    <div class="search-container">
                        <input type="text" id="locationSearch" placeholder="搜索地址或地点" class="search-input" data-translate="location.search.placeholder">
                        <button type="button" id="searchBtn" class="search-btn">
                            <i class="fa-solid fa-search"></i>
                        </button>
                    </div>
                </div>

                <!-- 地图区域 -->
                <div class="map-container">
                    <div id="mapContainer" style="width: 100%; height: 100%;"></div>
                    <div id="mapPlaceholder" class="map-placeholder" style="display: none;">
                        <i class="fa-solid fa-map-location-dot"></i>
                        <p data-translate="location.map.loading">地图加载中...</p>
                    </div>
                </div>

                <!-- 位置信息显示 -->
                <div class="location-info" id="locationInfo" style="display: none;">
                    <h3 data-translate="location.selected.info">选择的位置信息</h3>
                    <div class="location-details">
                        <div class="detail-item">
                            <label data-translate="location.detail.address">详细地址：</label>
                            <span id="selectedAddress"></span>
                        </div>
                        <div class="detail-item">
                            <label data-translate="location.detail.coordinates">坐标：</label>
                            <span id="selectedCoordinates"></span>
                        </div>
                    </div>
                </div>

                <!-- 操作按钮 -->
                <div class="action-buttons">
                    <button type="button" id="confirmBtn" class="btn-primary" disabled>
                        <i class="fa-solid fa-check"></i>
                        <span data-translate="location.confirm">确认选择</span>
                    </button>
                    <button type="button" id="cancelBtn" class="btn-secondary">
                        <i class="fa-solid fa-times"></i>
                        <span data-translate="location.cancel">取消</span>
                    </button>
                </div>
            </div>
            
        </div>
    </div>

    <style>
        /* 位置选择界面样式 */
        .search-container {
            position: relative;
            display: flex;
            margin-bottom: 20px;
        }
        
        .search-input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e1e5e9;
            border-radius: 8px 0 0 8px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s ease;
        }
        
        .search-input:focus {
            border-color: #00BCD4;
        }
        
        .search-btn {
            padding: 12px 16px;
            background: #00BCD4;
            color: white;
            border: none;
            border-radius: 0 8px 8px 0;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        
        .search-btn:hover {
            background: #0097A7;
        }
        
        .map-container {
            height: 400px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        
        .map-placeholder {
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #f8f9fa;
            color: #666;
        }
        
        .map-placeholder i {
            font-size: 48px;
            margin-bottom: 16px;
            color: #00BCD4;
        }
        
        .location-info {
            background: #f8f9fa;
            border: 1px solid #e1e5e9;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 20px;
        }
        
        .location-info h3 {
            margin: 0 0 12px 0;
            color: #333;
            font-size: 16px;
        }
        
        .location-details {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .detail-item {
            display: flex;
            align-items: center;
        }
        
        .detail-item label {
            font-weight: 600;
            color: #555;
            min-width: 80px;
        }
        
        .detail-item span {
            color: #333;
            flex: 1;
        }
        
        .action-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
        }
        
        .btn-primary, .btn-secondary {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-primary {
            background: #00BCD4;
            color: white;
        }
        
        .btn-primary:hover:not(:disabled) {
            background: #0097A7;
        }
        
        .btn-primary:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .btn-secondary {
            background: #f8f9fa;
            color: #666;
            border: 1px solid #e1e5e9;
        }
        
        .btn-secondary:hover {
            background: #e9ecef;
        }
    </style>

    <script>
        // 翻译函数
        function tr(key) {
            if (window.LanguageConfig) {
                return window.LanguageConfig.getText(key);
            }
            return key;
        }
        

        // WGS-84 to GCJ-02 coordinate conversion (fix offset on Gaode tiles)
        const PI = Math.PI;
        const A = 6378245.0;
        const EE = 0.00669342162296594323;

        function outOfChina(lat, lng) {
            return !(lng > 73.66 && lng < 135.05 && lat > 3.86 && lat < 53.55);
        }
        function transformLat(x, y) {
            var ret = -100.0 + 2.0*x + 3.0*y + 0.2*y*y + 0.1*x*y + 0.2*Math.sqrt(Math.abs(x));
            ret += (20.0*Math.sin(6.0*x*PI) + 20.0*Math.sin(2.0*x*PI)) * 2.0 / 3.0;
            ret += (20.0*Math.sin(y*PI) + 40.0*Math.sin(y/3.0*PI)) * 2.0 / 3.0;
            ret += (160.0*Math.sin(y/12.0*PI) + 320*Math.sin(y*PI/30.0)) * 2.0 / 3.0;
            return ret;
        }
        function transformLng(x, y) {
            var ret = 300.0 + x + 2.0*y + 0.1*x*x + 0.1*x*y + 0.1*Math.sqrt(Math.abs(x));
            ret += (20.0*Math.sin(6.0*x*PI) + 20.0*Math.sin(2.0*x*PI)) * 2.0 / 3.0;
            ret += (20.0*Math.sin(x*PI) + 40.0*Math.sin(x/3.0*PI)) * 2.0 / 3.0;
            ret += (150.0*Math.sin(x/12.0*PI) + 300.0*Math.sin(x/30.0*PI)) * 2.0 / 3.0;
            return ret;
        }
        function wgs84ToGcj02(lat, lng) {
            if (outOfChina(lat, lng)) return {lat: lat, lng: lng};
            var dLat = transformLat(lng - 105.0, lat - 35.0);
            var dLng = transformLng(lng - 105.0, lat - 35.0);
            var radLat = lat / 180.0 * PI;
            var magic = Math.sin(radLat);
            magic = 1 - EE * magic * magic;
            var sqrtMagic = Math.sqrt(magic);
            dLat = (dLat * 180.0) / ((A * (1 - EE)) / (magic * sqrtMagic) * PI);
            dLng = (dLng * 180.0) / (A / sqrtMagic * Math.cos(radLat) * PI);
            return {lat: lat + dLat, lng: lng + dLng};
        }
        function gcj02ToWgs84(lat, lng) {
            if (outOfChina(lat, lng)) return {lat: lat, lng: lng};
            var dLat = transformLat(lng - 105.0, lat - 35.0);
            var dLng = transformLng(lng - 105.0, lat - 35.0);
            var radLat = lat / 180.0 * PI;
            var magic = Math.sin(radLat);
            magic = 1 - EE * magic * magic;
            var sqrtMagic = Math.sqrt(magic);
            dLat = (dLat * 180.0) / ((A * (1 - EE)) / (magic * sqrtMagic) * PI);
            dLng = (dLng * 180.0) / (A / sqrtMagic * Math.cos(radLat) * PI);
            return {lat: lat - dLat, lng: lng - dLng};
        }

        // 位置选择器JavaScript功能
        let selectedLocation = null;
        let currentPosition = null;
        let map = null;
        let marker = null;

        // DOM元素
        const searchInput = document.getElementById('locationSearch');
        const searchBtn = document.getElementById('searchBtn');
        const mapContainer = document.getElementById('mapContainer');
        const mapPlaceholder = document.getElementById('mapPlaceholder');
        const locationInfo = document.getElementById('locationInfo');
        const selectedAddress = document.getElementById('selectedAddress');
        const selectedCoordinates = document.getElementById('selectedCoordinates');
        const confirmBtn = document.getElementById('confirmBtn');
        const cancelBtn = document.getElementById('cancelBtn');

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            initializeLocationSelector();
        });

        function initializeLocationSelector() {
            // 绑定事件监听器
            searchBtn.addEventListener('click', handleSearch);
            searchInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    handleSearch();
                }
            });
            
            confirmBtn.addEventListener('click', handleConfirm);
            cancelBtn.addEventListener('click', handleCancel);
            
            // 初始化地图
            initMap();
            
            // 尝试获取当前位置
            getCurrentLocation();
        }

        // 初始化地图
        function initMap() {
            console.log('开始初始化地图...');
            
            try {
                // 使用Leaflet创建真实地图
                if (typeof L !== 'undefined') {
                    console.log('Leaflet库已加载，开始创建地图...');
                    
                    // 创建地图实例
                    map = L.map('mapContainer', {
                        center: [39.9042, 116.4074],
                        zoom: 13,
                        zoomControl: true
                    });
                    
                    // 使用高德地图瓦片（国内更稳定）
                    const amapLayer = L.tileLayer('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}', {
                        attribution: '© 高德地图',
                        subdomains: '1234',
                        maxZoom: 18
                    });
                    
                    // 备用：OpenStreetMap
                    const osmLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                        attribution: '© OpenStreetMap contributors',
                        maxZoom: 18
                    });
                    
                    // 先尝试高德地图
                    amapLayer.addTo(map);
                    
                    // 监听瓦片加载错误，切换到OSM
                    amapLayer.on('tileerror', function() {
                        console.log('高德地图瓦片加载失败，切换到OpenStreetMap');
                        map.removeLayer(amapLayer);
                        osmLayer.addTo(map);
                    });
                    
                    // 隐藏占位符
                    mapPlaceholder.style.display = 'none';
                    
                    // 地图点击事件
                    map.on('click', function(e) {
                        const lat = e.latlng.lat;
                        const lng = e.latlng.lng;
                        // Map uses GCJ-02, convert to WGS-84 for reverse geocode
                        const wgs = gcj02ToWgs84(lat, lng);
                        console.log('Map click (GCJ-02):', lat, lng, 'WGS-84:', wgs.lat, wgs.lng);
                        reverseGeocode(wgs.lat, wgs.lng);
                    });
                    
                    console.log('地图初始化成功');
                } else {
                    console.error('Leaflet地图库未加载');
                    showSimplifiedMap();
                }
            } catch (error) {
                console.error('地图初始化失败:', error);
                showSimplifiedMap();
            }
        }
        
        // 显示本地地图（备用方案）
        function showLocalMap() {
            mapContainer.innerHTML = `
                <div style="width: 100%; height: 100%; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center;">
                    <div style="position: absolute; top: 20px; left: 20px; background: rgba(255,255,255,0.2); padding: 10px; border-radius: 8px;">
                        <div style="font-size: 14px; margin-bottom: 5px;">📍 ${tr('location.current.position')}</div>
                        <div style="font-size: 12px; opacity: 0.8;">${tr('location.default.beijing')}</div>
                    </div>
                    
                    <div style="position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.2); padding: 10px; border-radius: 8px;">
                        <div style="font-size: 14px; margin-bottom: 5px;">🔍 ${tr('location.search.title')}</div>
                        <div style="font-size: 12px; opacity: 0.8;">${tr('location.click.select')}</div>
                    </div>
                    
                    <i class="fas fa-map-marker-alt" style="font-size: 48px; margin-bottom: 16px; animation: pulse 2s infinite;"></i>
                    <h3 style="margin: 0 0 8px 0; font-size: 18px;">${tr('location.interactive.map')}</h3>
                    <p style="margin: 0; font-size: 14px; opacity: 0.8;">${tr('location.click.anywhere')}</p>
                    
                    <div style="position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(255,255,255,0.2); padding: 8px 16px; border-radius: 20px; font-size: 12px;">
                        <i class="fas fa-hand-pointer" style="margin-right: 5px;"></i>
                        ${tr('location.click.select')}
                    </div>
                    
                    <style>
                        @keyframes pulse {
                            0% { transform: scale(1); }
                            50% { transform: scale(1.1); }
                            100% { transform: scale(1); }
                        }
                    </style>
                </div>
            `;
            
            // 模拟地图点击功能
            mapContainer.addEventListener('click', function(e) {
                const rect = mapContainer.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                // 简单的坐标转换（北京地区）
                const lat = 39.9042 + (y - rect.height/2) * 0.001;
                const lng = 116.4074 + (x - rect.width/2) * 0.001;
                
                console.log('本地地图点击位置:', lat, lng);
                reverseGeocode(lat, lng);
                
                // 显示点击效果
                const clickEffect = document.createElement('div');
                clickEffect.style.cssText = `
                    position: absolute;
                    left: ${x}px;
                    top: ${y}px;
                    width: 20px;
                    height: 20px;
                    background: rgba(255,255,255,0.8);
                    border-radius: 50%;
                    transform: translate(-50%, -50%);
                    animation: clickPulse 0.6s ease-out;
                    pointer-events: none;
                    z-index: 1000;
                `;
                mapContainer.appendChild(clickEffect);
                
                setTimeout(() => {
                    if (clickEffect.parentNode) {
                        clickEffect.parentNode.removeChild(clickEffect);
                    }
                }, 600);
            });
            
            // 添加点击动画样式
            const style = document.createElement('style');
            style.textContent = `
                @keyframes clickPulse {
                    0% { transform: translate(-50%, -50%) scale(0); opacity: 1; }
                    100% { transform: translate(-50%, -50%) scale(3); opacity: 0; }
                }
            `;
            document.head.appendChild(style);
            
            mapPlaceholder.style.display = 'none';
            console.log('本地地图界面初始化成功');
        }

        // 显示简化地图界面（备用方案）
        function showSimplifiedMap() {
            mapContainer.innerHTML = `
                <div style="width: 100%; height: 100%; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center;">
                    <i class="fa-solid fa-map-location-dot" style="font-size: 48px; margin-bottom: 16px; color: #fff;"></i>
                    <h3 style="margin: 0 0 8px 0; font-size: 18px;">${tr('location.selector.title')}</h3>
                    <p style="margin: 0; font-size: 14px; opacity: 0.9;">${tr('location.selector.subtitle')}</p>
                    <div style="margin-top: 20px;">
                        <button onclick="getCurrentLocation()" style="background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.3); color: white; padding: 8px 16px; border-radius: 6px; cursor: pointer; margin: 0 8px;">
                            <i class="fa-solid fa-location-crosshairs"></i> ${tr('location.get.current')}
                        </button>
                    </div>
                </div>
            `;
            mapPlaceholder.style.display = 'none';
            console.log('简化地图界面初始化成功');
        }

        // 获取当前位置
        function getCurrentLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    function(position) {
                        var lat = position.coords.latitude;
                        var lng = position.coords.longitude;
                        // Convert WGS-84 to GCJ-02 for Gaode map display
                        var gcj = wgs84ToGcj02(lat, lng);
                        currentPosition = {
                            latitude: gcj.lat,
                            longitude: gcj.lng,
                            wgsLat: lat,
                            wgsLng: lng
                        };
                        console.log('GPS raw (WGS-84):', lat, lng, 'Converted (GCJ-02):', gcj.lat, gcj.lng);
                        if (map) map.setView([gcj.lat, gcj.lng], 16);
                        reverseGeocode(lat, lng);
                    },
                    function(error) {
                        console.log('获取位置失败:', error);
                        showMessage(tr('location.current.failed'), 'warning');
                    },
                    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
                );
            } else {
                showMessage(tr('location.geolocation.unsupported'), 'error');
            }
        }

        // 处理搜索
        function handleSearch() {
            const query = searchInput.value.trim();
            if (!query) {
                showMessage(tr('location.search.empty'), 'warning');
                return;
            }
            
            searchLocation(query);
        }

        // 搜索位置
        async function searchLocation(query) {
            try {
                showMessage(tr('location.search.processing'), 'info');
                
                // 调用地理编码API
                const response = await fetch(`/api/location/geocode?address=${encodeURIComponent(query)}`);
                const result = await response.json();
                
                if (result.code === 200) {
                    const location = {
                        latitude: result.data.latitude,
                        longitude: result.data.longitude,
                        address: query
                    };
                    
                    selectLocation(location);
                    showMessage(tr('location.search.success'), 'success');
                } else {
                    showMessage(tr('location.search.failed') + ': ' + result.message, 'error');
                }
            } catch (error) {
                console.error('搜索位置失败:', error);
                showMessage(tr('location.search.retry'), 'error');
            }
        }

        // 逆地理编码
        async function reverseGeocode(latitude, longitude) {
            try {
                console.log('开始逆地理编码:', latitude, longitude);
                const response = await fetch(`/api/location/reverse-geocode?latitude=${latitude}&longitude=${longitude}`);
                const result = await response.json();
                
                console.log('逆地理编码响应:', result);
                
                if (result.code === 200) {
                    const location = {
                        latitude: latitude,
                        longitude: longitude,
                        address: result.data.address
                    };
                    
                    console.log('逆地理编码成功，地址:', result.data.address);
                    selectLocation(location);
                } else {
                    console.error('逆地理编码失败:', result.message);
                    // 使用默认地址
                    const location = {
                        latitude: latitude,
                        longitude: longitude,
                        address: `坐标: ${latitude.toFixed(6)}, ${longitude.toFixed(6)}`
                    };
                    selectLocation(location);
                }
            } catch (error) {
                console.error('逆地理编码失败:', error);
                // 使用默认地址
                const location = {
                    latitude: latitude,
                    longitude: longitude,
                    address: `坐标: ${latitude.toFixed(6)}, ${longitude.toFixed(6)}`
                };
                selectLocation(location);
            }
        }

        // 选择位置
        function selectLocation(location) {
            selectedLocation = location;
            
            // 更新显示
            selectedAddress.textContent = location.address;
            selectedCoordinates.textContent = `${location.latitude.toFixed(6)}, ${location.longitude.toFixed(6)}`;
            
            // 显示位置信息
            locationInfo.style.display = 'block';
            
            // 更新地图位置
            if (map) {
                // 移动地图中心到新位置
                map.setView([location.latitude, location.longitude], 13);
                
                // 更新地图标记
                updateMapMarker(location.latitude, location.longitude);
                
                console.log('地图已定位到:', location.address, location.latitude, location.longitude);
            }
            
            // 启用确认按钮
            confirmBtn.disabled = false;
            
            // 在地图上显示标记
            if (map) {
                updateMapMarker(location.latitude, location.longitude);
            }
            
            console.log('选择位置:', location);
        }

        // 更新地图标记
        function updateMapMarker(lat, lng) {
            if (map && typeof L !== 'undefined') {
                // 清除现有标记
                if (marker) {
                    map.removeLayer(marker);
                }
                
                // 添加新标记
                marker = L.marker([lat, lng]).addTo(map);
                
                // 设置地图中心
                map.setView([lat, lng], 15);
                
                // 添加弹出窗口
                marker.bindPopup(`<b>${tr('location.selected.position')}</b><br>${tr('location.detail.coordinates')}: ${lat.toFixed(6)}, ${lng.toFixed(6)}`).openPopup();
                
                console.log('地图标记已更新:', lat, lng);
            } else {
                // 回退到简化显示
                if (mapContainer) {
                    mapContainer.innerHTML = `
                        <div style="width: 100%; height: 100%; background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center;">
                            <i class="fa-solid fa-map-pin" style="font-size: 48px; margin-bottom: 16px; color: #fff;"></i>
                            <h3 style="margin: 0 0 8px 0; font-size: 18px;">${tr('location.selected.position')}</h3>
                            <p style="margin: 0; font-size: 14px; opacity: 0.9;">${tr('location.detail.coordinates')}: ${lat.toFixed(6)}, ${lng.toFixed(6)}</p>
                            <div style="margin-top: 20px;">
                                <button onclick="getCurrentLocation()" style="background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.3); color: white; padding: 8px 16px; border-radius: 6px; cursor: pointer; margin: 0 8px;">
                                    <i class="fa-solid fa-location-crosshairs"></i> ${tr('location.relocate')}
                                </button>
                            </div>
                        </div>
                    `;
                }
            }
        }

        // 确认选择
        function handleConfirm() {
            if (!selectedLocation) {
                showMessage(tr('location.confirm.empty'), 'warning');
                return;
            }
            
            // 将位置信息存储到localStorage
            localStorage.setItem('esg_selected_location', JSON.stringify(selectedLocation));
            
            // 返回上一页
            window.history.back();
        }

        // 取消选择
        function handleCancel() {
            // 返回上一页
            window.history.back();
        }

        // 显示消息
        function showMessage(message, type = 'info') {
            // 创建消息元素
            const messageEl = document.createElement('div');
            messageEl.className = `message message-${type}`;
            messageEl.textContent = message;
            
            // 添加样式
            messageEl.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                padding: 12px 16px;
                border-radius: 8px;
                color: white;
                font-weight: 500;
                z-index: 1000;
                max-width: 300px;
                word-wrap: break-word;
            `;
            
            // 根据类型设置颜色
            const colors = {
                success: '#4CAF50',
                error: '#f44336',
                warning: '#ff9800',
                info: '#2196F3'
            };
            messageEl.style.backgroundColor = colors[type] || colors.info;
            
            // 添加到页面
            document.body.appendChild(messageEl);
            
            // 3秒后自动移除
            setTimeout(() => {
                if (messageEl.parentNode) {
                    messageEl.parentNode.removeChild(messageEl);
                }
            }, 3000);
        }
    </script>
</body>
</html>
