<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="ui-id" content="注册3">
    <title>ESG VISA - What's your role?</title>
    <link rel="stylesheet" href="/static/styles.css?v=20250819-register-3">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container" data-ui-id="register-3">
        <div class="grid-pattern"></div>
        

        <div class="main-content-login" style="max-width:960px;">
            <!-- 顶部品牌 -->
            <div class="logo-container" style="margin-bottom:16px;">
                <div class="logo-image" style="width:48px;height:48px;">
                    <img src="/static/log.png" alt="ESG VISA Logo" class="logo-img" style="width:40px;height:40px;">
                </div>
            </div>

            <div class="header" style="margin-bottom:10px;">
                <h1 data-translate="role.title">What's your role?</h1>
                <p data-translate="role.subtitle">This helps us tailor the experience to your needs.</p>
            </div>

            <div class="form-container">
                <div class="form-section" id="roleSection">
                    <div class="role-grid">
                        <label class="role-card">
                            <input type="radio" name="role" value="owner" checked>
                            <div class="role-icon">🏢</div>
                            <div class="role-title" data-translate="role.owner">Owner</div>
                        </label>
                        <label class="role-card">
                            <input type="radio" name="role" value="property_manager">
                            <div class="role-icon">🏙️</div>
                            <div class="role-title" data-translate="role.manager">Property Manager</div>
                        </label>
                        <label class="role-card">
                            <input type="radio" name="role" value="institution">
                            <div class="role-icon">👨‍💼</div>
                            <div class="role-title" data-translate="role.institution">Institution(Other)</div>
                        </label>
                    </div>

                    <!-- 角色特定额外字段容器 -->
                    <div id="extraFields" style="display:none; max-width:820px; margin:0 auto;">
                        <div class="form-group">
                            <input type="text" id="extraInput1" placeholder="" data-translate="property.name.placeholder" />
                        </div>
                        <div class="form-group">
                            <input type="text" id="extraInput2" placeholder="" data-translate="occupation.placeholder" />
                        </div>
                    </div>

                    <div class="wizard-footer">
                        <a class="back-link" href="/static/register-2.html" style="opacity:.6;">
                            <i class="fa-solid fa-arrow-left"></i>
                            <span data-translate="back">Back</span>
                        </a>
                        <div class="wizard-dots">
                            <span class="dot"></span>
                            <span class="dot active"></span>
                            <span class="dot"></span>
                        </div>
                        <a class="back-link" href="#" id="nextBtn">
                            <span data-translate="next">Next</span>
                            <i class="fa-solid fa-arrow-right"></i>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <style>
        .role-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin:20px 0 30px}
        .role-card{position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:28px;border:2px solid #e1e5e9;border-radius:12px;cursor:pointer;transition:.2s background,.2s box-shadow,.2s border}
        .role-card:hover{box-shadow:0 6px 18px rgba(0,0,0,.06)}
        .role-card input{position:absolute;right:12px;top:12px;width:18px;height:18px}
        .role-card .role-icon{font-size:42px}
        .role-card .role-title{font-weight:600}
        .role-card input:checked + .role-icon, .role-card input:checked ~ .role-title{}
        .role-card input:checked ~ .role-title, .role-card input:checked ~ .role-icon{}
        .role-card input:checked ~ .role-title{}
        .role-card:has(input:checked){border-color:#00BCD4;background:#f5feff}

        .wizard-footer{display:flex;align-items:center;justify-content:space-between;margin-top:10px}
        .wizard-dots{display:flex;gap:6px;align-items:center}
        .wizard-dots .dot{width:6px;height:6px;border-radius:50%;background:#cfd8dc}
        .wizard-dots .dot.active{background:#00BCD4}

        @media(max-width:900px){.role-grid{grid-template-columns:1fr;}}
    </style>

    <script>
    // 根据角色切换显示的额外输入项
    const extras = {
        owner: { visible: false, p1: '', p2: '' },
        property_manager: { visible: true, p1: 'property.name.placeholder', p2: 'occupation.placeholder' },
        institution: { visible: true, p1: 'institution.name.placeholder', p2: 'occupation.placeholder' }
    };

    function renderExtraByRole(role){
        const cfg = extras[role] || extras.owner;
        const wrap = document.getElementById('extraFields');
        const i1 = document.getElementById('extraInput1');
        const i2 = document.getElementById('extraInput2');
        if (!wrap || !i1 || !i2) return;
        wrap.style.display = cfg.visible ? 'block' : 'none';
        
        // 设置翻译键而不是直接设置placeholder
        if (cfg.visible) {
            i1.setAttribute('data-translate', cfg.p1);
            i2.setAttribute('data-translate', cfg.p2);
            
            // 如果有语言配置，立即应用翻译
            if (window.LanguageConfig) {
                const langData = window.LanguageConfig.data[window.LanguageConfig.currentLanguage];
                if (langData) {
                    i1.placeholder = langData.translations[cfg.p1] || cfg.p1;
                    i2.placeholder = langData.translations[cfg.p2] || cfg.p2;
                }
            }
        }
    }

    document.querySelectorAll('input[name="role"]').forEach(r => {
        r.addEventListener('change', () => {
            const val = r.value;
            // 保存角色信息到localStorage
            localStorage.setItem('esg_role', val);
            
            // 选择 Owner 时直接进入注册3.1
            if (val === 'owner') {
                // 确保角色信息保存后再跳转
                setTimeout(() => {
                    window.location.href = '/static/register-3-1.html';
                }, 100);
                return;
            }
            renderExtraByRole(val);
        });
    });

    // 页面加载完成后初始化
    document.addEventListener('DOMContentLoaded', function() {
        // 确保默认选中的角色被保存到localStorage
        const defaultRole = document.querySelector('input[name="role"]:checked');
        if (defaultRole) {
            localStorage.setItem('esg_role', defaultRole.value);
            console.log('✅ 默认角色已保存:', defaultRole.value);
            renderExtraByRole(defaultRole.value);
        }
    });

    document.getElementById('nextBtn').addEventListener('click', async function(e){
        e.preventDefault();
        const checked = document.querySelector('input[name="role"]:checked');
        const role = checked ? checked.value : '';
        
        if (!role) {
            alert('请选择用户角色');
            return;
        }
        
        // 获取额外字段值
        const extraInput1 = document.getElementById('extraInput1').value;
        const extraInput2 = document.getElementById('extraInput2').value;
        
        // 存储角色信息
        localStorage.setItem('esg_role', role);
        
        // 准备注册数据
        const registerData = {
            email: localStorage.getItem('esg_email'),
            password: localStorage.getItem('esg_password'),
            fullName: localStorage.getItem('esg_fullName'),
            phone: localStorage.getItem('esg_phone'),  // 添加手机号字段
            role: role
        };
        
        // 根据角色添加额外字段
        if (role === 'property_manager') {
            registerData.propertyName = extraInput1;
            registerData.occupation = extraInput2;
        } else if (role === 'institution') {
            registerData.institution = extraInput1;
            registerData.occupation = extraInput2;
        }
        
        try {
            // 调用后端注册API
            const response = await fetch('/api/register/step2', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(registerData)
            });
            
            const result = await response.json();
            
            if (result.code === 200) {
                if (role === 'owner') {
                    // Owner需要填写建筑信息
                    window.location.href = '/static/register-3-1.html';
                } else {
                    // 其他角色直接完成注册，设置用户登录状态
                    const userInfo = {
                        Email: localStorage.getItem('esg_email'),
                        Name: localStorage.getItem('esg_fullName'),
                        Role: role,
                        Phone: localStorage.getItem('esg_phone') || '', // 从localStorage获取手机号
                        Age: '20', // 自动设置为20岁
                        DID: '', // 先设为空，等待链码返回
                        RegisterTime: '', // 等待后端返回真实时间
                        isLoggedIn: true
                    };
                    
                    // 根据角色添加额外字段
                    if (role === 'property_manager') {
                        userInfo.PropertyName = extraInput1;
                        userInfo.Occupation = extraInput2;
                    } else if (role === 'institution') {
                        userInfo.Institution = extraInput1;
                        userInfo.Occupation = extraInput2;
                    }
                    
                    // 存储链码返回的数据（如果后端返回了的话）
                    if (result.data && result.data.chaincodeData) {
                        localStorage.setItem('chaincodeData', JSON.stringify(result.data.chaincodeData));
                        // 将链码数据也合并到用户信息中，优先使用链码返回的DID
                        Object.assign(userInfo, result.data.chaincodeData);
                        // 如果链码返回了DID，使用链码的DID；否则使用本地生成的
                        if (!userInfo.DID || userInfo.DID === '') {
                            userInfo.DID = generateDID(localStorage.getItem('esg_email'));
                        }
                        // 使用后端返回的真实注册时间
                        if (result.data.RegisterTime) {
                            userInfo.RegisterTime = result.data.RegisterTime;
                        }
                        localStorage.setItem('userInfo', JSON.stringify(userInfo));
                    } else {
                        // 如果没有链码数据，使用本地生成的DID
                        userInfo.DID = generateDID(localStorage.getItem('esg_email'));
                        // 使用后端返回的真实注册时间
                        if (result.data.RegisterTime) {
                            userInfo.RegisterTime = result.data.RegisterTime;
                        }
                        localStorage.setItem('userInfo', JSON.stringify(userInfo));
                    }
                    
                    // 跳转到仪表板界面
                    window.location.href = result.data.redirect_url || '/static/dashboard.html';
                }
            } else {
                alert(result.message || '注册失败');
            }
        } catch (error) {
            console.error('注册错误:', error);
            alert('注册失败，请重试');
        }
    });
    
    // 生成DID标识符
    function generateDID(email) {
        const timestamp = Date.now();
        const hash = btoa(email + timestamp).replace(/[^a-zA-Z0-9]/g, '').substring(0, 16);
        return `did:esg:user:${hash}`;
    }
    </script>
    <script>
    (function(){
        if (window.__esgLangInit_v3) return; window.__esgLangInit_v3 = true;
        window.languageData = window.languageData || {
            en:{code:'EN',flag:'🇺🇸',t:{
                title:'What\'s your role?',
                subtitle:'This helps us tailor the experience to your needs.',
                architect:'Architect',
                developer:'Developer',
                owner:'Building Owner',
                manager:'Property Manager',
                consultant:'Sustainability Consultant',
                other:'Other',
                continue:'Continue',
                back:'Back',
                processing:'Processing...'
            }},
            'zh-cn':{code:'简体',flag:'🇨🇳',t:{
                title:'你的角色是？',
                subtitle:'这将帮助我们为你定制体验。',
                architect:'建筑师',
                developer:'开发商',
                owner:'建筑业主',
                manager:'物业经理',
                consultant:'可持续顾问',
                other:'其他',
                continue:'继续',
                back:'返回',
                processing:'处理中...'
            }},
            'zh-tw':{code:'繁體',flag:'🇭🇰',t:{
                title:'你的角色是？',
                subtitle:'這將幫助我們為你定制體驗。',
                architect:'建築師',
                developer:'開發商',
                owner:'建築業主',
                manager:'物業經理',
                consultant:'可持續顧問',
                other:'其他',
                continue:'繼續',
                back:'返回',
                processing:'處理中...'
            }}
        };
        function apply(lang){ 
            var d=languageData[lang]; if(!d) return; 
            var h1=document.querySelector('.header h1'); if(h1) h1.textContent=d.t.title; 
            var sub=document.querySelector('.header p'); if(sub) sub.textContent=d.t.subtitle;
            // 更新角色选项
            var roles=document.querySelectorAll('.role-option');
            if(roles.length>0){
                roles[0].textContent=d.t.architect;
                roles[1].textContent=d.t.developer;
                roles[2].textContent=d.t.owner;
                roles[3].textContent=d.t.manager;
                roles[4].textContent=d.t.consultant;
                roles[5].textContent=d.t.other;
            }
            var btn=document.querySelector('.btn-primary'); if(btn) btn.textContent=d.t.continue;
            var back=document.querySelector('.back-link'); if(back) back.textContent=d.t.back;
            var loading=document.querySelector('.loading-spinner p'); if(loading) loading.textContent=d.t.processing;
        }
        document.addEventListener('DOMContentLoaded',function(){ 
            var lang=localStorage.getItem('esg_language')||'en'; 
            apply(lang); 
        });
    })();
    </script>
    
    <!-- 引入统一语言配置和自动翻译 -->
    <script src="/static/language-config.js"></script>
    <script src="/static/auto-translate.js"></script>
</body>
</html>
