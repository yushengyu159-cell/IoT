<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Dashboard Debug</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; }
        .debug-box { background: white; padding: 20px; margin: 10px 0; border-radius: 8px; }
        .success { color: green; }
        .error { color: red; }
        pre { background: #f9f9f9; padding: 10px; overflow-x: auto; }
        button { padding: 10px 20px; background: #2c7a62; color: white; border: none; border-radius: 4px; cursor: pointer; margin: 5px; }
    </style>
</head>
<body>
    <h1>Dashboard调试页面</h1>
    
    <div class="debug-box">
        <h3>1. LocalStorage检查</h3>
        <p>userInfo: <span id="userInfoStatus" class="error">检查中...</span></p>
        <p>isLoggedIn: <span id="loginStatus" class="error">检查中...</span></p>
        <pre id="userInfoContent"></pre>
    </div>

    <div class="debug-box">
        <h3>2. Dashboard元素检查</h3>
        <p>userName元素: <span id="userNameCheck" class="error">检查中...</span></p>
        <p>userEmail元素: <span id="userEmailCheck" class="error">检查中...</span></p>
    </div>

    <div class="debug-box">
        <h3>3. 操作</h3>
        <button onclick="testRedirect()">测试跳转到Dashboard</button>
        <button onclick="clearAll()">清除所有存储</button>
        <button onclick="setTestUser()">设置测试用户</button>
    </div>

    <div class="debug-box">
        <h3>4. 控制台日志</h3>
        <div id="consoleLog" style="background: #f9f9f9; padding: 10px; max-height: 200px; overflow-y: auto;"></div>
    </div>

    <script>
        // 捕获console.log
        const originalLog = console.log;
        console.log = function(...args) {
            document.getElementById('consoleLog').innerHTML += '<div>' + args.join(' ') + '</div>';
            originalLog.apply(console, args);
        };

        // 检查localStorage
        const userInfo = localStorage.getItem('userInfo');
        const isLoggedIn = localStorage.getItem('isLoggedIn');

        if (userInfo) {
            document.getElementById('userInfoStatus').innerHTML = '<span class="success">✓ 存在</span>';
            document.getElementById('userInfoContent').textContent = userInfo;
        } else {
            document.getElementById('userInfoStatus').innerHTML = '<span class="error">✗ 不存在</span>';
        }

        if (isLoggedIn === 'true') {
            document.getElementById('loginStatus').innerHTML = '<span class="success">✓ 已登录</span>';
        } else {
            document.getElementById('loginStatus').innerHTML = '<span class="error">✗ 未登录</span>';
        }

        // 测试跳转
        function testRedirect() {
            console.log('尝试跳转到Dashboard...');
            window.location.href = '/static/dashboard.html';
        }

        // 清除存储
        function clearAll() {
            localStorage.clear();
            alert('已清除所有存储');
            location.reload();
        }

        // 设置测试用户
        function setTestUser() {
            const testUser = {
                Email: 'test@example.com',
                FullName: 'Test User',
                Role: 'user',
                Phone: '',
                Age: 25,
                DID: 'test-did-123',
                isLoggedIn: true
            };
            localStorage.setItem('userInfo', JSON.stringify(testUser));
            localStorage.setItem('isLoggedIn', 'true');
            alert('测试用户已设置');
            location.reload();
        }
    </script>
</body>
</html>
