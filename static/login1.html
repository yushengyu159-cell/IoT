<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="ui-id" content="wechat-login">
    <title>ESG VISA - WeChat QR Code Login</title>
    <link rel="stylesheet" href="/static/styles.css?v=20250819-register-2">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 移除自定义body样式，使用styles.css中的样式 */
        
        /* 二维码容器样式 */

        .qrcode-container {
            margin: 30px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .qrcode-wrapper {
            width: 280px;
            height: 280px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 20px;
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
        }

        .qrcode-wrapper img {
            max-width: 100%;
            max-height: 100%;
            border-radius: 8px;
        }

        .status-message {
            padding: 12px 16px;
            border-radius: 8px;
            margin: 16px 0;
            font-size: 14px;
            text-align: center;
            transition: all 0.3s ease;
        }
        
        .status-message.hidden {
            display: none;
        }

        .status-waiting {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
        }

        .status-scanned {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .status-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status-expired {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .status-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }

        /* 按钮样式使用styles.css中的btn类 */
        .action-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .hidden {
            display: none;
        }

        .step-indicator {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 20px 0;
        }

        .step {
            width: 40px;
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            transition: all 0.3s ease;
        }

        .step.active {
            background: #667eea;
        }
    </style>
</head>
<body>
    <div class="container" data-ui-id="wechat-login">
        <div class="grid-pattern"></div>

        <div class="main-content-login">
            <!-- 顶部图标 -->
            <div class="logo-container" style="margin-bottom:24px;">
                <div class="logo-image" style="width:64px;height:64px;">
                    <img src="/static/log.png" alt="ESG VISA Logo" class="logo-img" style="width:50px;height:50px;">
                </div>
            </div>

            <div class="header" style="margin-bottom:22px;">
                <h1 data-translate="wechat.login.title">微信扫码登录</h1>
                <p data-translate="wechat.login.subtitle">使用微信扫描下方二维码进行登录</p>
            </div>

            <div class="form-container">
                <div class="form-section">

                    <div class="step-indicator">
                        <div class="step active" id="step1"></div>
                        <div class="step" id="step2"></div>
                        <div class="step" id="step3"></div>
                    </div>

                    <div class="qrcode-container">
                        <div class="qrcode-wrapper" id="qrcodeWrapper">
                            <img id="qrcodeImage" src="" alt="微信登录二维码" />
                        </div>
                        <div id="statusMessage" class="status-message status-waiting">
                            <span data-translate="wechat.qrcode.waiting">等待扫描...</span>
                        </div>
                    </div>

                    <div class="action-buttons">
                        <button id="refreshBtn" class="btn btn-secondary" onclick="refreshQRCode()" data-translate="wechat.qrcode.refresh">刷新二维码</button>
                        <button id="backBtn" class="btn btn-secondary" onclick="goBack()" data-translate="wechat.login.back">返回</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let loginToken = '';
        let pollInterval = null;
        let currentStep = 1;

        // 页面加载时生成二维码
        window.onload = async function() {
            await generateQRCode();
            startPolling();
        };

        // 页面卸载时清除轮询
        window.onbeforeunload = function() {
            if (pollInterval) {
                clearInterval(pollInterval);
            }
        };

        // 翻译函数
        function tr(key, fallback) {
            try {
                const lang = localStorage.getItem('esg_language') || 'zh';
                const langData = window.LanguageConfig?.data[lang];
                if (langData && langData.translations && langData.translations[key]) {
                    return langData.translations[key];
                }
            } catch (e) {
                console.error('Translation error:', e);
            }
            return fallback || key;
        }

        // 生成二维码
        async function generateQRCode() {
            const email = localStorage.getItem('esg_login_email');
            if (!email) {
                showStatus(tr('wechat.qrcode.email.missing', '邮箱信息丢失，正在返回登录页面...'), 'error');
                setTimeout(() => {
                    window.location.href = '/static/index.html';
                }, 2000);
                return;
            }

            try {
                const response = await fetch('/api/wechat/check-and-generate-qrcode', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email })
                });

                const result = await response.json();

                if (result.code === 200 && result.data.exists) {
                    document.getElementById('qrcodeImage').src = result.data.qrcode_url;
                    loginToken = result.data.login_token;
                    updateStep(1);
                    showStatus(tr('wechat.qrcode.scan', '请使用微信扫描二维码'), 'waiting');
                } else {
                    showStatus(tr('wechat.qrcode.email.not.exists', '邮箱不存在，正在跳转到注册页面...'), 'error');
                    setTimeout(() => {
                        localStorage.setItem('esg_email', email);
                        window.location.href = '/static/register1.html#register';
                    }, 2000);
                }
            } catch (error) {
                console.error('生成二维码失败:', error);
                showStatus('生成二维码失败，请点击刷新按钮重试', 'error');
            }
        }

        // 开始轮询检查登录状态
        function startPolling() {
            if (pollInterval) {
                clearInterval(pollInterval);
            }

            pollInterval = setInterval(async () => {
                if (!loginToken) {
                    console.warn('loginToken为空，停止轮询');
                    return;
                }

                const email = localStorage.getItem('esg_login_email');
                try {
                    const response = await fetch(`/api/wechat/check-login-status?token=${loginToken}&email=${encodeURIComponent(email)}`);
                    const result = await response.json();

                    console.log('轮询登录状态:', JSON.stringify(result));
                    console.log('状态值:', result.data?.status);

                    if (result.code === 200) {
                        const status = result.data?.status;
                        if (status) {
                            console.log('处理状态:', status);
                            handleLoginStatus(status);
                        } else {
                            console.warn('状态为空，result.data:', result.data);
                        }
                    } else {
                        console.error('API返回错误:', result);
                    }
                } catch (error) {
                    console.error('检查登录状态失败:', error);
                }
            }, 3000); // 每3秒检查一次
        }

        // 处理登录状态
        function handleLoginStatus(status) {
            console.log('handleLoginStatus 被调用，状态:', status);
            
            switch (status) {
                case 'waiting':
                    updateStep(1);
                    showStatus(tr('wechat.qrcode.scan', '请使用微信扫描二维码'), 'waiting');
                    break;
                case 'scanned':
                    updateStep(2);
                    showStatus(tr('wechat.qrcode.scanned', '二维码已扫描，请在手机上确认登录'), 'scanned');
                    break;
                case 'confirmed':
                    console.log('=== 检测到confirmed状态，准备跳转 ===');
                    console.log('清理轮询定时器');
                    clearInterval(pollInterval);
                    pollInterval = null;
                    
                    updateStep(3);
                    showStatus(tr('wechat.qrcode.confirmed', '登录成功，正在获取用户信息...'), 'success');
                    
                    // 先获取用户信息并保存到localStorage，再跳转（参考register1.html的登录流程）
                    const email = localStorage.getItem('esg_login_email');
                    if (email) {
                        console.log('获取用户信息，邮箱:', email);
                        fetch(`/api/register/status?email=${encodeURIComponent(email)}`)
                            .then(response => response.json())
                            .then(result => {
                                console.log('用户信息获取结果:', result);
                                if (result.code === 200 && result.data) {
                                    // 参考register1.html中的userInfo结构
                                    const userInfo = {
                                        Email: email,
                                        Name: result.data.FullName || result.data.fullName || email,
                                        Role: result.data.Role || result.data.role || 'user',
                                        Phone: result.data.Phone || result.data.phone || '',
                                        Age: result.data.Age || 20,
                                        DID: result.data.did || result.data.DID || '',
                                        RegisterTime: result.data.RegisterTime || '',
                                        isLoggedIn: true,
                                        // 额外字段以兼容file-management.js
                                        email: email,
                                        did: result.data.did || result.data.DID || '',
                                        txID: result.data.txID || result.data.txid || '',
                                        txid: result.data.txID || result.data.txid || '',
                                        FullName: result.data.FullName || result.data.fullName || email,
                                        BuildingName: result.data.building_name || result.data.BuildingName || '',
                                        BuildingAddr: result.data.building_addr || result.data.BuildingAddr || '',
                                        BuildingType: result.data.building_type || result.data.BuildingType || '',
                                        PropertyName: result.data.property_name || result.data.PropertyName || '',
                                        Occupation: result.data.occupation || result.data.Occupation || '',
                                        Institution: result.data.institution || result.data.Institution || ''
                                    };
                                    
                                    localStorage.setItem('userInfo', JSON.stringify(userInfo));
                                    localStorage.setItem('isLoggedIn', 'true');
                                    console.log('用户信息已保存到localStorage:', userInfo);
                                    
                                    // 参考register1.html的跳转逻辑：根据用户邮箱决定跳转页面
                                    let redirectUrl = '/static/dashboard.html'; // 默认跳转到仪表板
                                    
                                    // 只有 esgvisa@gmail.com 可以进入权限管理界面
                                    if (email === 'esgvisa@gmail.com') {
                                        redirectUrl = '/static/control1.html';
                                        console.log('管理员用户，跳转到权限管理界面');
                                    } else {
                                        console.log('普通用户，跳转到仪表板界面');
                                    }
                                    
                                    // 使用和register1.html相同的跳转方式
                                    try {
                                        history.replaceState(null, '', redirectUrl);
                                    } catch (_) {}
                                    
                                    try {
                                        window.location.replace(redirectUrl);
                                    } catch (_) {}
                                    
                                    setTimeout(() => {
                                        if (!redirectUrl.includes(window.location.pathname)) {
                                            window.location.href = redirectUrl;
                                        }
                                    }, 120);
                                    
                                } else {
                                    console.error('获取用户信息失败:', result);
                                    showStatus(tr('wechat.login.info.failed', '获取用户信息失败，请重试'), 'error');
                                }
                            })
                            .catch(error => {
                                console.error('获取用户信息出错:', error);
                                showStatus(tr('wechat.login.network.error', '网络错误，请重试'), 'error');
                            });
                    } else {
                        console.error('未找到邮箱信息');
                        showStatus(tr('wechat.login.incomplete', '登录信息不完整，请重新登录'), 'error');
                        setTimeout(() => {
                            window.location.href = '/static/index.html';
                        }, 2000);
                    }
                    break;
                case 'expired':
                    showStatus(tr('wechat.qrcode.expired', '二维码已过期，请点击刷新按钮'), 'expired');
                    clearInterval(pollInterval);
                    pollInterval = null;
                    break;
                default:
                    console.warn('未知状态:', status);
            }
        }

        // 更新步骤指示器
        function updateStep(step) {
            for (let i = 1; i <= 3; i++) {
                const stepEl = document.getElementById(`step${i}`);
                if (stepEl) {
                    stepEl.classList.toggle('active', i === step);
                }
            }
            currentStep = step;
        }

        // 显示状态消息
        function showStatus(message, type) {
            const statusEl = document.getElementById('statusMessage');
            if (statusEl) {
                statusEl.innerHTML = message;
                statusEl.className = `status-message status-${type}`;
            }
        }

        // 刷新二维码
        function refreshQRCode() {
            if (pollInterval) {
                clearInterval(pollInterval);
            }
            updateStep(1);
            showStatus(tr('wechat.qrcode.generating', '正在生成新的二维码...'), 'waiting');
            generateQRCode();
            setTimeout(() => {
                startPolling();
            }, 1000);
        }

        // 返回登录页面
        function goBack() {
            if (pollInterval) {
                clearInterval(pollInterval);
            }
            window.location.href = '/static/index.html';
        }
    </script>
    
    <!-- 引入统一语言配置和自动翻译 -->
    <script src="/static/language-config.js"></script>
    <script src="/static/auto-translate.js"></script>
</body>
</html>
