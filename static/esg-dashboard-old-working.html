                                </div>
                                <div className="text-right">
                                    <div className="font-bold text-xl text-gray-900">100,000</div>
                                    <div className="text-xs text-gray-400 mt-0.5">{t('unitsToken')}</div>
                                </div>
                            </div>

                            <div className="bg-white border border-gray-200 rounded-xl p-5 shadow-sm flex items-center justify-between">
                                <div className="flex items-center gap-4">
                                    <div className="w-10 h-10 rounded-full bg-emerald-50 text-emerald-500 flex items-center justify-center text-xl">⬡</div>
                                    <div>
                                        <div className="text-xs text-gray-500 mb-0.5">{t('energyDataAsset')}</div>
                                        <h4 className="font-bold text-gray-800 text-lg">{t('solarEnergyData')}</h4>
                                    </div>
                                </div>
                                <div className="text-right">
                                    <div className="font-bold text-xl text-gray-900">4,500</div>
                                    <div className="text-xs text-gray-400 mt-0.5">{t('unitsToken')}</div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div>
                        <h3 className="text-xs font-bold text-gray-400 mb-4 tracking-widest uppercase">{t('dataMarketplace')}</h3>
                        <div className="bg-white border border-gray-200 rounded-xl shadow-sm overflow-hidden">
                            <div className="p-5 border-b border-gray-100 flex justify-between items-center hover:bg-gray-50 cursor-pointer transition-colors">
                                <div className="flex items-center gap-3">
                                    <span className="text-indigo-400">📄</span>
                                    <span className="font-medium text-gray-800">{t('carbonCreditCont')}</span>
                                </div>
                                <span className="text-emerald-500 font-bold text-sm">{t('activeLedger')}</span>
                            </div>
                            <div className="p-5 border-b border-gray-100 flex justify-between items-center hover:bg-gray-50 cursor-pointer transition-colors">
                                <div className="flex items-center gap-3">
                                    <span className="text-blue-400">🔗</span>
                                    <span className="font-medium text-gray-800">{t('shareEsgApi')}</span>
                                </div>
                                <span className="text-gray-500 text-sm">{t('subscribersData')}</span>
                            </div>
                            <div className="p-5 flex justify-between items-center hover:bg-gray-50 cursor-pointer transition-colors">
                                <div className="flex items-center gap-3">
                                    <span className="text-purple-400">💱</span>
                                    <span className="font-medium text-gray-800">{t('sellBldgData')}</span>
                                </div>
                                <span className="text-indigo-600 font-medium text-sm">{t('manageMarketplace')}</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            );
        };

        // --- Layout Components ---

        const Sidebar = ({ activeTab, setActiveTab }) => {
            const { t } = useI18n();
            const [assetExpanded, setAssetExpanded] = useState(true);

            const NavItem = ({ id, label, icon, isSubItem = false }) => {
                const isActive = activeTab === id;
                return (
                    <div 
                        onClick={() => setActiveTab(id)}
                        className={`cursor-pointer flex items-center px-4 py-3 rounded-lg mb-1.5 text-sm transition-all duration-200 ${
                            isActive 
                                ? 'bg-emerald-500/20 text-emerald-400 font-bold border border-emerald-500/30 shadow-inner' 
                                : 'text-slate-400 hover:bg-slate-800 hover:text-slate-200 font-medium border border-transparent'
                        } ${isSubItem ? 'ml-9 py-2.5' : ''}`}
                    >
                        {!isSubItem && <span className="mr-3 text-lg opacity-80">{icon}</span>}
                        <span>{label}</span>
                    </div>
                );
            };

            return (
                <div className="w-[280px] bg-[#0f172a] text-white flex flex-col h-full shrink-0 shadow-2xl z-20">
                    <div className="p-6 flex items-center gap-3 border-b border-slate-800/80 mb-4">
                        <div className="w-9 h-9 rounded-full bg-gradient-to-br from-emerald-400 to-emerald-600 flex items-center justify-center text-white font-bold italic shadow-lg shadow-emerald-500/30 text-lg">V</div>
                        <span className="text-xl font-black tracking-widest text-slate-100">ESG VISA</span>
                    </div>
                    
                    <div className="flex-1 overflow-y-auto py-2 px-4">
                        <div className="text-[11px] text-slate-500 font-bold tracking-[0.2em] mb-4 px-2 mt-2">{t('coreModules')}</div>
                        
                        <NavItem id="dashboard" label={t('dashboard')} icon="📈" />
                        
                        <div className="mb-1.5">
                            <div 
                                onClick={() => setAssetExpanded(!assetExpanded)}
                                className={`cursor-pointer flex items-center justify-between px-4 py-3 rounded-lg text-sm transition-all duration-200 font-medium border ${
                                    (activeTab === 'dataInfo' || activeTab === 'deviceMgt') && !assetExpanded
                                        ? 'bg-emerald-500/10 text-emerald-400 border-emerald-500/20' 
                                        : 'text-slate-400 hover:bg-slate-800 hover:text-slate-200 border-transparent'
                                }`}
                            >
                                <div className="flex items-center"><span className="mr-3 text-lg opacity-80">🏢</span><span>{t('assetProfile')}</span></div>
                                <span className="text-[10px] opacity-60">{assetExpanded ? '▼' : '▶'}</span>
                            </div>
                            {assetExpanded && (
                                <div className="mt-1.5 border-l-2 border-slate-800 ml-6 pl-1 py-1">
                                    <NavItem id="dataInfo" label={t('dataInfo')} isSubItem={true} />
                                    <NavItem id="deviceMgt" label={t('deviceMgt')} isSubItem={true} />
                                </div>
                            )}
                        </div>
                        
                        <NavItem id="dataVault" label={t('dataVault')} icon="🗄" />
                        <NavItem id="sustainability" label={t('sustainability')} icon="🍃" />
                        <NavItem id="maintenance" label={t('maintenance')} icon="🔧" />
                        <NavItem id="finance" label={t('finance')} icon="💰" />
                        <NavItem id="digitalAssets" label={t('digitalAssets')} icon="⬡" />
                    </div>

                    <div className="p-4 border-t border-slate-800/80 bg-slate-900/50">
                        <div className="cursor-pointer flex items-center px-4 py-3 rounded-lg text-sm text-slate-400 hover:text-slate-200 hover:bg-slate-800 transition-colors font-medium">
                            <span className="mr-3 text-lg opacity-80">⚙</span><span>{t('settings')}</span>
                        </div>
                    </div>
                </div>
            );
        };

        const Header = ({ activeTab }) => {
            const { lang, setLang, t } = useI18n();

            const getTitle = () => {
                switch(activeTab) {
                    case 'dashboard': return t('dashboard');
                    case 'dataInfo': return t('assetProfile') + ' / ' + t('dataInfo');
                    case 'deviceMgt': return t('assetProfile') + ' / ' + t('deviceMgt');
                    case 'dataVault': return t('dataVault');
                    case 'sustainability': return t('sustainability');
                    case 'maintenance': return t('maintenance');
                    case 'finance': return t('finance');
                    case 'digitalAssets': return t('digitalAssets');
                    default: return 'ESG VISA';
                }
            };

            return (
                <div className="h-[72px] bg-white border-b border-gray-200 flex items-center justify-between px-8 shrink-0 shadow-sm z-10 relative">
                    <div className="flex items-center gap-8">
                        <h1 className="text-xl font-bold text-gray-800 tracking-tight">{getTitle()}</h1>
                        <div className="flex items-center bg-indigo-50 text-indigo-700 px-4 py-2 rounded-lg text-sm font-bold border border-indigo-100 cursor-pointer shadow-sm hover:bg-indigo-100 transition-colors">
                            🏢 {t('godfreyCentre')} <span className="ml-3 text-[10px] opacity-60">▼</span>
                        </div>
                    </div>
                    <div className="flex items-center gap-6">
                        <div className="flex items-center gap-2 bg-pink-50 text-pink-600 px-4 py-2 rounded-lg text-sm font-bold border border-pink-100 shadow-sm cursor-pointer hover:bg-pink-100 transition-colors">
                            <span>ⓘ {t('normalMode')}</span>
                            <span className="ml-2 text-[10px] opacity-60">▼</span>
                        </div>
                        
                        {/* Language Toggle */}
                        <div className="flex bg-gray-100 rounded-lg p-1 shadow-inner">
                            <button 
                                onClick={() => setLang('en')}
                                className={`px-3 py-1 text-xs font-bold rounded-md transition-all ${lang === 'en' ? 'bg-white text-indigo-600 shadow-sm' : 'text-gray-500 hover:text-gray-700'}`}
                            >
                                EN
                            </button>
                            <button 
                                onClick={() => setLang('zh-CN')}
                                className={`px-3 py-1 text-xs font-bold rounded-md transition-all ${lang === 'zh-CN' ? 'bg-white text-indigo-600 shadow-sm' : 'text-gray-500 hover:text-gray-700'}`}
                            >
                                简
                            </button>
                            <button 
                                onClick={() => setLang('zh-TW')}
                                className={`px-3 py-1 text-xs font-bold rounded-md transition-all ${lang === 'zh-TW' ? 'bg-white text-indigo-600 shadow-sm' : 'text-gray-500 hover:text-gray-700'}`}
                            >
                                繁
                            </button>
                        </div>

                        <div className="w-10 h-10 rounded-full bg-slate-800 text-white flex items-center justify-center text-sm font-bold shadow-md cursor-pointer hover:ring-2 ring-slate-400 ring-offset-2 transition-all">
                            EM
                        </div>
                    </div>
                </div>
            );
        };

        const AppContent = () => {
            const [activeTab, setActiveTab] = useState('dashboard');

            return (
                <div className="flex h-screen bg-[#f8fafc] font-sans text-slate-800">
                    <Sidebar activeTab={activeTab} setActiveTab={setActiveTab} />
                    <div className="flex-1 flex flex-col overflow-hidden">
                        <Header activeTab={activeTab} />
                        <main className="flex-1 overflow-y-auto p-8">
                            {activeTab === 'dashboard' && <Dashboard />}
                            {activeTab === 'dataInfo' && <DataInfo />}
                            {activeTab === 'deviceMgt' && <DeviceMgt />}
                            {activeTab === 'dataVault' && <DataVault />}
                            {activeTab === 'sustainability' && <Sustainability />}
                            {activeTab === 'maintenance' && <Maintenance />}
                            {activeTab === 'finance' && <Finance />}
                            {activeTab === 'digitalAssets' && <DigitalAssets />}
                        </main>
                    </div>
                </div>
            );
        };

        const App = () => (
            <I18nProvider>
                <AppContent />
            </I18nProvider>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
<script src="user-info-handler.js?v=1774879464"></script>
</body>
</html>
