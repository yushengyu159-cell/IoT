                var typeMap={electric:'Electric',water:'Water',gas:'Gas',management:'Mgmt Fee',other:'Other'};
                html+=makeTable(['Bill ID','Type','Unit','Amount','Status','Action'],bills,function(b){
                    var sc=b.status==='paid'?'<span style="color:#059669;font-weight:700">Paid</span>':'<span style="color:#dc2626;font-weight:700">Unpaid</span>';
                    var bid=b.billID||'';
                    var act=b.status!=='paid'?'<button onclick="window._bp(\''+bid+'\')" style="background:#059669;color:white;padding:4px 12px;border-radius:4px;font-size:12px;font-weight:700;border:none;cursor:pointer">Pay on Chain</button>':'-';
                    return '<tr style="border-bottom:1px solid #f1f5f9"><td style="padding:8px 12px;font-family:monospace;font-size:11px">'+bid+'</td><td style="padding:8px 12px">'+(typeMap[b.billType]||b.billType||'-')+'</td><td style="padding:8px 12px">'+(b.unitID||'-')+'</td><td style="padding:8px 12px;text-align:right;font-weight:700">HKD '+(b.amount||0).toFixed(2)+'</td><td style="padding:8px 12px">'+sc+'</td><td style="padding:8px 12px">'+act+'</td></tr>';
                });
                setHTML('billChainData',html);
            };
            if(bc) bc.onclick=async function(){
                var unit=prompt('Unit ID:','UNIT-12F-A');if(!unit)return;
                var type=prompt('Type (electric/water/gas/management):','electric');
                var amt=prompt('Amount (HKD):','2850.00');if(!amt)return;
                var period=prompt('Period:','2025-05');
                await mcInvoke('billing-channel','CreateBill',['BILL-'+Date.now(),BID,unit,'USER-001',type||'electric',parseFloat(amt)||0,period||sd()]);
                if(br)br.click();
            };
            if(bm) bm.onclick=async function(){
                var unit=prompt('Unit ID:','UNIT-12F-A');if(!unit)return;
                var type=prompt('Meter type (electric/water/gas):','electric');
                var prev=prompt('Previous reading:','1000');
                var curr=prompt('Current reading:','1150');if(!curr)return;
                await mcInvoke('billing-channel','RecordMeterReading',['MTR-'+Date.now(),BID,unit,type||'electric',parseFloat(prev)||0,parseFloat(curr)||0]);
                alert('Meter reading recorded on blockchain');
                if(br)br.click();
            };
            if(bq) bq.onclick=async function(){
                await mcInvoke('billing-channel','CreateBill',['BILL-'+Date.now(),BID,'UNIT-12F-A','USER-001','electric',2850.50,'2025-05']);
                if(br)br.click();
            };
            window._bp=async function(bid){if(!confirm('Pay bill '+bid+'?'))return;await mcInvoke('billing-channel','PayBill',[bid]);if(br)br.click();};
        })();


        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
