<script>
// Dashboard 文件列表加载修复
console.log('[Dashboard] 文件列表加载器启动');

// 自动加载文件列表
window.addEventListener('load', function() {
    setTimeout(function() {
        console.log('[Dashboard] 开始加载文件列表...');
        
        // 获取用户邮箱
        var userInfoStr = localStorage.getItem('userInfo');
        if (!userInfoStr) {
            console.error('未找到用户信息');
            return;
        }
        
        var userInfo = JSON.parse(userInfoStr);
        var userEmail = userInfo.Email || userInfo.email;
        
        if (!userEmail) {
            console.error('用户信息缺少邮箱');
            return;
        }
        
        console.log('用户邮箱:', userEmail);
        
        // 调用API
        var url = '/api/esg/list?userEmail=' + encodeURIComponent(userEmail);
        console.log('请求URL:', url);
        
        fetch(url)
            .then(function(response) {
                console.log('响应状态:', response.status);
                return response.json();
            })
            .then(function(result) {
                console.log('响应数据:', result);
                
                if (result.code === 200) {
                    var files = result.data || [];
                    console.log('成功获取 ' + files.length + ' 个文件');
                    
                    // 如果 file-management.js 的 displayFileList 存在，使用它
                    if (typeof displayFileList === 'function') {
                        displayFileList(files);
                    } else {
                        console.log('使用简易显示方式');
                        displayFileListSimple(files);
                    }
                } else {
                    console.error('API返回错误:', result.message);
                }
            })
            .catch(function(error) {
                console.error('加载文件列表失败:', error);
            });
    }, 500);
});
