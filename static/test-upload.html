<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试文件上传</title>
</head>
<body>
    <h1>测试文件上传功能</h1>
    
    <form id="testUploadForm">
        <div>
            <label for="testFile">选择文件:</label>
            <input type="file" id="testFile" name="file" required>
        </div>
        <div>
            <label for="testDesc">文件描述:</label>
            <textarea id="testDesc" name="desc" required>测试文件</textarea>
        </div>
        <div>
            <label for="testUploader">上传者:</label>
            <input type="text" id="testUploader" name="uploader" value="test" required>
        </div>
        <button type="submit">测试上传</button>
    </form>
    
    <div id="result"></div>
    
    <script>
        document.getElementById('testUploadForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            console.log('🚀 测试上传表单提交');
            
            const formData = new FormData();
            const file = document.getElementById('testFile').files[0];
            const desc = document.getElementById('testDesc').value;
            const uploader = document.getElementById('testUploader').value;
            
            if (!file) {
                alert('请选择文件');
                return;
            }
            
            formData.append('file', file);
            formData.append('desc', desc);
            formData.append('uploader', uploader);
            
            console.log('📤 准备上传文件:', file.name);
            console.log('📤 文件大小:', file.size);
            console.log('📤 描述:', desc);
            console.log('📤 上传者:', uploader);
            
            try {
                const response = await fetch('/api/esg/upload', {
                    method: 'POST',
                    body: formData
                });
                
                console.log('📥 响应状态:', response.status);
                console.log('📥 响应头:', response.headers);
                
                const result = await response.json();
                console.log('📥 响应数据:', result);
                
                document.getElementById('result').innerHTML = `
                    <h3>上传结果:</h3>
                    <pre>${JSON.stringify(result, null, 2)}</pre>
                `;
                
            } catch (error) {
                console.error('❌ 上传错误:', error);
                document.getElementById('result').innerHTML = `
                    <h3>上传错误:</h3>
                    <p style="color: red;">${error.message}</p>
                `;
            }
        });
    </script>
</body>
</html>
