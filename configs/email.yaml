# ========================================
# 🔐 SMTP授权码获取步骤
# ========================================

# 1️⃣ 163邮箱SMTP授权码获取：
#    - 登录163邮箱网页版：https://mail.163.com
#    - 设置 → POP3/SMTP/IMAP
#    - 开启SMTP服务，设置授权码
#    - 将授权码填入上面的 password 字段

# 2️⃣ QQ邮箱SMTP授权码获取：
#    - 登录QQ邮箱网页版：https://mail.qq.com
#    - 设置 → 账户 → POP3/IMAP/SMTP/Exchange/CardDAV/CalDAV服务
#    - 开启SMTP服务，获取授权码
#    - 将授权码填入上面的 password 字段

# 3️⃣ 配置完成后：
#    - 重启后端服务：go run main.go
#    - 测试邮件发送功能
#    - 检查邮箱是否收到验证码

# ⚠️  注意：配置真实授权码后，系统将自动发送邮件到邮箱，不再显示在日志中
