version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: fabric-sdk-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: Test@123456
      MYSQL_DATABASE: esg
      MYSQL_USER: fabric
      MYSQL_PASSWORD: Test@123456
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - fabric-network

  mysql-admin:
    image: phpmyadmin/phpmyadmin
    container_name: fabric-sdk-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: Test@123456
    ports:
      - "8080:80"
    depends_on:
      - mysql
    networks:
      - fabric-network

volumes:
  mysql_data:
    driver: local

networks:
  fabric-network:
    driver: bridge
